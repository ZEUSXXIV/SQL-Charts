<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuerySight Visualizer</title>
    <!-- Modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-color: #0F172A;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --primary: #A855F7;
            --primary-glow: rgba(168, 85, 247, 0.35);
            --accent: #06B6D4;
            --accent-glow: rgba(6, 182, 212, 0.25);
            --table-header: #1E293B;
            --table-row-alt: rgba(30, 41, 59, 0.4);
            --success: #10B981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* Ambient background glow */
        .ambient-glow {
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140vw;
            height: 140vh;
            background: 
                radial-gradient(circle at 20% 30%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.12) 0%, transparent 45%);
            z-index: -1;
            pointer-events: none;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header Card */
        header {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px 24px;
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px -15px rgba(0,0,0,0.5);
        }

        .title-section h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFF 30%, #A855F7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .title-section p {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--success);
        }

        .actions-group {
            display: flex;
            gap: 10px;
        }

        /* Buttons styling */
        button {
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        button.primary-btn {
            background: linear-gradient(135deg, #A855F7 0%, #7E22CE 100%);
            border: none;
            box-shadow: 0 4px 14px var(--primary-glow);
        }

        button.primary-btn:hover {
            box-shadow: 0 6px 20px var(--primary-glow);
            filter: brightness(1.1);
        }

        /* Chart Canvas Card */
        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px -15px rgba(0,0,0,0.5);
            position: relative;
            min-height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chart-container {
            width: 100%;
            height: 100%;
            max-height: 480px;
            position: relative;
        }

        /* Welcome/Waiting State */
        .waiting-state {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 40px;
        }

        .waiting-logo {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(168, 85, 247, 0.4);
            animation: pulse-logo 2.5s infinite ease-in-out;
        }

        .waiting-logo svg {
            width: 36px;
            height: 36px;
            fill: #FFF;
        }

        @keyframes pulse-logo {
            0% { transform: scale(1); box-shadow: 0 8px 30px rgba(168, 85, 247, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 12px 40px rgba(6, 182, 212, 0.6); }
            100% { transform: scale(1); box-shadow: 0 8px 30px rgba(168, 85, 247, 0.4); }
        }

        .waiting-state h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 600;
        }

        .waiting-state p {
            color: var(--text-muted);
            font-size: 14px;
            max-width: 380px;
            line-height: 1.5;
        }

        /* Data Explorer Card */
        .data-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px -15px rgba(0,0,0,0.5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 300px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }

        th {
            background-color: var(--table-header);
            color: var(--text-main);
            font-weight: 600;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        tr:nth-child(even) {
            background-color: var(--table-row-alt);
        }

        tr:hover td {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.02);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    
    <div class="container">
        <!-- Dashboard Header -->
        <header id="header-container" class="hidden">
            <div class="title-section">
                <h1 id="chart-title">Sales Analytics</h1>
                <p><span class="status-dot"></span> Live chart via QuerySight MCP Server</p>
            </div>
            <div class="actions-group">
                <button onclick="copyToClipboard()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    Copy
                </button>
                <button class="primary-btn" onclick="exportPNG()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Export PNG
                </button>
            </div>
        </header>

        <!-- Main Chart Card -->
        <main class="chart-card">
            <!-- Waiting Screen -->
            <div id="waiting-screen" class="waiting-state">
                <div class="waiting-logo">
                    <svg viewBox="0 0 24 24">
                        <path d="M19,3H5C3.9,3,3,3.9,3,5v14c0,1.1,0.9,2,2,2h14c1.1,0,2-0.9,2-2V5C21,3.9,20.1,3,19,3z M9,17H7v-7h2V17z M13,17h-2V7h2V17z M17,17h-2v-4h2V17z"/>
                    </svg>
                </div>
                <h2>Waiting for Data...</h2>
                <p>Execute the <code>render_ssms_chart</code> tool from the Copilot Agent to instantly display your SQL query results here.</p>
            </div>

            <!-- Chart Container -->
            <div id="chart-wrapper" class="chart-container hidden">
                <canvas id="chartCanvas"></canvas>
            </div>
        </main>

        <!-- Data Explorer Table -->
        <section id="data-explorer" class="data-card hidden">
            <div class="card-header">
                <h2>Raw Query Records</h2>
                <span id="record-count" style="font-size: 12px; color: var(--text-muted)">0 rows</span>
            </div>
            <div class="table-wrapper">
                <table id="dataTable">
                    <thead>
                        <tr id="tableHeaderRow"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        let myChart = null;

        // Colors configurations
        const gradients = [
            { start: 'rgba(168, 85, 247, 0.85)', end: 'rgba(126, 34, 206, 0.4)' }, // Purple
            { start: 'rgba(6, 182, 212, 0.85)', end: 'rgba(8, 145, 178, 0.4)' },  // Cyan
            { start: 'rgba(16, 185, 129, 0.85)', end: 'rgba(4, 120, 87, 0.4)' },  // Green
            { start: 'rgba(244, 63, 94, 0.85)', end: 'rgba(190, 24, 74, 0.4)' },   // Pink
            { start: 'rgba(245, 158, 11, 0.85)', end: 'rgba(180, 83, 9, 0.4)' }    // Orange
        ];

        const solidColors = [
            '#A855F7', '#06B6D4', '#10B981', '#F43F5E', '#F59E0B', '#3B82F6', '#EC4899'
        ];

        /**
         * Global API called by WebView2 Host
         * @param {Object} chartData
         * Format: { chart_type: 'bar'|'line'|'pie', title: 'Sales', data: [ { category: 'A', value: 10 }, ... ] }
         */
        window.renderChart = function(chartData) {
            console.log("Rendering chart payload:", chartData);
            
            // Validate payload
            if (!chartData || !chartData.data || !Array.isArray(chartData.data) || chartData.data.length === 0) {
                console.error("Invalid or empty data payload.");
                return;
            }

            // Hide waiting state and show containers
            document.getElementById('waiting-screen').classList.add('hidden');
            document.getElementById('header-container').classList.remove('hidden');
            document.getElementById('chart-wrapper').classList.remove('hidden');
            document.getElementById('data-explorer').classList.remove('hidden');

            // Set Title
            document.getElementById('chart-title').innerText = chartData.title || "SQL Query Result Chart";
            
            // Build raw table
            buildTable(chartData.data);

            // Extract labels and datasets
            const keys = Object.keys(chartData.data[0]);
            // Infer label key (first non-numeric field, otherwise first field)
            let labelKey = keys.find(k => typeof chartData.data[0][k] === 'string' || isNaN(Number(chartData.data[0][k]))) || keys[0];
            // Infer value keys (all fields that are numeric)
            let valueKeys = keys.filter(k => k !== labelKey && !isNaN(Number(chartData.data[0][k])));
            if (valueKeys.length === 0) {
                // Fallback: if no numeric keys, use the second key
                valueKeys = keys.length > 1 ? [keys[1]] : [keys[0]];
            }

            const labels = chartData.data.map(item => String(item[labelKey]));

            // Destroy existing chart to prevent garbage overlap
            if (myChart) {
                myChart.destroy();
            }

            const ctx = document.getElementById('chartCanvas').getContext('2d');
            const type = (chartData.chart_type || 'bar').toLowerCase();

            // Setup styling variables
            const datasets = [];
            
            if (type === 'pie' || type === 'doughnut') {
                // Pie chart gets slicing colors
                const valueKey = valueKeys[0];
                const dataValues = chartData.data.map(item => Number(item[valueKey]));
                
                datasets.push({
                    label: valueKey,
                    data: dataValues,
                    backgroundColor: solidColors.slice(0, dataValues.length),
                    borderColor: 'rgba(15, 23, 42, 0.9)',
                    borderWidth: 2
                });
            } else {
                // Bar or Line: multiple datasets if multiple numeric columns exist
                valueKeys.forEach((vKey, index) => {
                    const dataValues = chartData.data.map(item => Number(item[vKey]));
                    const gradConfig = gradients[index % gradients.length];
                    
                    let bgCol, borderCol;

                    if (type === 'line') {
                        // Line styling
                        const lineGrad = ctx.createLinearGradient(0, 0, 0, 400);
                        lineGrad.addColorStop(0, gradConfig.start.replace('0.85', '0.25'));
                        lineGrad.addColorStop(1, 'rgba(15, 23, 42, 0)');
                        bgCol = lineGrad;
                        borderCol = solidColors[index % solidColors.length];
                    } else {
                        // Bar styling
                        const barGrad = ctx.createLinearGradient(0, 0, 0, 400);
                        barGrad.addColorStop(0, gradConfig.start);
                        barGrad.addColorStop(1, gradConfig.end);
                        bgCol = barGrad;
                        borderCol = solidColors[index % solidColors.length];
                    }

                    datasets.push({
                        label: vKey,
                        data: dataValues,
                        backgroundColor: bgCol,
                        borderColor: borderCol,
                        borderWidth: type === 'line' ? 3 : 1.5,
                        fill: type === 'line',
                        tension: type === 'line' ? 0.35 : 0,
                        hoverBackgroundColor: type === 'bar' ? gradConfig.start : borderCol,
                        pointRadius: type === 'line' ? 4 : 0,
                        pointHoverRadius: 6
                    });
                });
            }

            // Global Chart.js options
            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            color: '#F8FAFC',
                            font: { family: 'Inter', size: 12 }
                        }
                    },
                    tooltip: {
                        backgroundColor: '#1E293B',
                        titleColor: '#F8FAFC',
                        titleFont: { family: 'Outfit', weight: 'bold' },
                        bodyColor: '#E2E8F0',
                        bodyFont: { family: 'Inter' },
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 1,
                        padding: 12,
                        cornerRadius: 8,
                        displayColors: true
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.04)' },
                        ticks: {
                            color: '#94A3B8',
                            font: { family: 'Inter', size: 11 }
                        }
                    },
                    y: {
                        grid: { color: 'rgba(255,255,255,0.04)' },
                        ticks: {
                            color: '#94A3B8',
                            font: { family: 'Inter', size: 11 }
                        }
                    }
                }
            };

            // Remove scales for pie charts
            if (type === 'pie' || type === 'doughnut') {
                delete chartOptions.scales;
            }

            // Render
            myChart = new Chart(ctx, {
                type: type === 'pie' ? 'pie' : (type === 'line' ? 'line' : 'bar'),
                data: { labels, datasets },
                options: chartOptions
            });
        };

        /**
         * Dynamically compiles and inserts the raw query records into the DOM table.
         * @param {Array} data
         */
        function buildTable(data) {
            const headerRow = document.getElementById('tableHeaderRow');
            const tbody = document.getElementById('tableBody');
            
            // Reset
            headerRow.innerHTML = '';
            tbody.innerHTML = '';
            
            if (data.length === 0) return;
            
            document.getElementById('record-count').innerText = `${data.length} records`;

            // Compile headers
            const keys = Object.keys(data[0]);
            keys.forEach(key => {
                const th = document.createElement('th');
                th.innerText = key;
                headerRow.appendChild(th);
            });

            // Compile body
            data.forEach(item => {
                const tr = document.createElement('tr');
                keys.forEach(key => {
                    const td = document.createElement('td');
                    td.innerText = item[key] !== null ? item[key] : 'NULL';
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }

        /**
         * Exports the rendered chart canvas element as a PNG image file download.
         */
        function exportPNG() {
            if (!myChart) return;
            const link = document.createElement('a');
            link.download = `${document.getElementById('chart-title').innerText.replace(/\s+/g, '_')}.png`;
            link.href = document.getElementById('chartCanvas').toDataURL('image/png');
            link.click();
        }

        /**
         * Copies the current chart canvas image data to the system clipboard.
         */
        function copyToClipboard() {
            if (!myChart) return;
            try {
                document.getElementById('chartCanvas').toBlob(blob => {
                    const item = new ClipboardItem({ "image/png": blob });
                    navigator.clipboard.write([item]).then(() => {
                        alert("Chart image copied to clipboard!");
                    });
                });
            } catch (err) {
                console.error("Could not copy canvas image to clipboard", err);
                alert("Failed to copy image. Copying as PNG is supported in secure environments.");
            }
        }
    </script>
</body>
</html>
